# Build validation and optional sync to the public mirror repo.
name: CI and Sync Public Repo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

  sync-pub:
    needs: build
    if: github.repository == 'leo-duran/simple-timer' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push main to pub
        env:
          PUB_REPO: leo-duran/simple-timer-pub
          PUB_PUSH_TOKEN: ${{ secrets.PUB_PUSH_TOKEN }}
        run: |
          if [ -z "$PUB_PUSH_TOKEN" ]; then
            echo "PUB_PUSH_TOKEN secret is not configured."
            exit 1
          fi

          git remote add pub "https://x-access-token:${PUB_PUSH_TOKEN}@github.com/${PUB_REPO}.git"
          git push pub HEAD:main

  publish-pages-artifact:
    needs: build
    if: github.repository == 'leo-duran/simple-timer-pub' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-pages:
    needs: publish-pages-artifact
    if: github.repository == 'leo-duran/simple-timer-pub' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
