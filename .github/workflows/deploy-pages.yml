# Publishes the Vite `dist/` output via GitHub Pages (static files — not Jekyll).
# In the repo: Settings → Pages → Build and deployment → Source: GitHub Actions.
# Do not add the “GitHub Pages Jekyll” starter workflow; it conflicts with this app.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # Project site: /<repo>/ ; user/org root site (username.github.io repo): /
      - name: Install and build
        env:
          VITE_BASE_PATH: ${{ github.event.repository.name == format('{0}.github.io', github.repository_owner) && '/' || format('/{0}/', github.event.repository.name) }}
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  sync-pub:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main to pub
        env:
          PUB_REPO: leo-duran/simple-timer-pub
          PUB_PUSH_TOKEN: ${{ secrets.PUB_PUSH_TOKEN }}
        run: |
          if [ -z "$PUB_PUSH_TOKEN" ]; then
            echo "PUB_PUSH_TOKEN secret is not configured."
            exit 1
          fi

          git remote add pub "https://x-access-token:${PUB_PUSH_TOKEN}@github.com/${PUB_REPO}.git"
          git push pub HEAD:main
